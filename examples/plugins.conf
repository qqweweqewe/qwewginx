worker_processes 1;

plugins {
    registry https://plugins.example.com;

    hello 0.1.0 {
        listen 127.0.0.1:9098;
        path /hello;
    }

    my-tool 0.0.1 from local {
        listen 127.0.0.1:9099;
    }
}

events {
    worker_connections 1024;
}

http {
    server {
        listen 127.0.0.1:9090;
        location / {
            return 200 "plugins example — http still required until plugin runtime ships\n";
        }
    }
}
