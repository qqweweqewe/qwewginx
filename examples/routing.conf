worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 127.0.0.1:9090;
        location / {
            return 200 "root\n";
        }
        location /api {
            return 200 "api\n";
        }
        location /api/v1 {
            return 200 "api v1\n";
        }
    }
}
